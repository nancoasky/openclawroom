version: "3.8"
services:
  openclaw-gateway:
    # 使用指定的 2026.3.8 版本镜像
    image: ghcr.io/openclaw/openclaw:2026.3.8
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      # 安全令牌（保留你的配置，建议后续替换为更复杂的随机串）
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN}
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # ========== 新增：OpenClaw 并发调优 ==========
      - WORKER_PROCESSES=4          # 匹配4物理核，提升并发处理能力
      - WORKER_THREADS=8            # 匹配8逻辑核，充分利用超线程
      - NODE_ENV=production         # 启用生产模式，禁用调试/日志冗余
      - UV_THREADPOOL_SIZE=16       # Node.js 线程池扩容（适配IO密集型场景）
    volumes:
      # 数据持久化（保留原有配置）
      - ./data:/home/node/.openclaw
      # 可选：挂载额外目录（按需启用）
      - ./workspace:/home/node/workspace
      - ./config:/home/node/config:ro
      - ./.npm-global:/home/node/.npm-global
      - ./.bashrc:/home/node/.bashrc
      # ========== 新增：优化IO性能 ==========
      - /tmp:/tmp:rw                # 共享宿主机临时目录，减少容器IO开销
    ports:
      # 保留本地回环绑定，避免公网暴露（安全优先）
      - "18789:18789"
    # ========== 优化：资源配置（适配4核8线程） ==========
    deploy:
      resources:
        limits:
          cpus: '4.0'               # 提升至4核（匹配物理核心数）
          memory: 8g                # 提升至8G，避免内存不足导致卡顿
        reservations:               # 预留基础资源，防止资源抢占
          cpus: '2.0'
          memory: 4g
    mem_swappiness: 0               # 禁用内存交换，杜绝换盘卡顿
    # ========== 优化：文件句柄 & 网络 ==========
    ulimits:
      nofile:
        soft: 65535                 # 提升文件句柄限制，支持高并发连接
        hard: 65535
    sysctls:
      - net.core.somaxconn=65535    # 扩大TCP监听队列，避免连接被拒绝
      - net.ipv4.tcp_tw_reuse=1     # 复用TIME_WAIT连接，减少连接建立开销
      - net.ipv4.tcp_fin_timeout=10 # 缩短FIN等待时间，释放端口更快
    # ========== 优化：健康检查（更精准） ==========
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health", "||", "exit", "1"]
      interval: 15s                 # 缩短检查间隔，更快发现异常
      timeout: 5s                   # 缩短超时时间，避免阻塞
      retries: 3
      start_period: 60s             # 延长启动等待，适配首次初始化耗时
    # ========== 新增：日志优化（减少IO开销） ==========
    logging:
      driver: "json-file"
      options:
        max-size: "10m"             # 单日志文件最大10M
        max-file: "3"               # 最多保留3个日志文件，避免日志占满磁盘